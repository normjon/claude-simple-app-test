{{- if .Values.ingress.enabled }}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ include "user-app.fullname" . }}
  labels:
    {{- include "user-app.labels" . | nindent 4 }}
  annotations:
    alb.ingress.kubernetes.io/scheme: {{ .Values.ingress.scheme }}
    alb.ingress.kubernetes.io/target-type: ip
    alb.ingress.kubernetes.io/listen-ports: '[{"HTTP":80}]'
    alb.ingress.kubernetes.io/group.name: {{ .Values.ingress.groupName }}
    alb.ingress.kubernetes.io/healthcheck-path: /{{ .Values.ingress.basePath }}/health
    alb.ingress.kubernetes.io/healthcheck-protocol: HTTP
    alb.ingress.kubernetes.io/healthcheck-success-codes: "200"
spec:
  ingressClassName: alb
  rules:
  - http:
      paths:
      - path: /{{ .Values.ingress.basePath }}
        pathType: Prefix
        backend:
          service:
            name: {{ include "user-app.fullname" . }}
            port:
              number: {{ .Values.service.port }}
{{- end }}
